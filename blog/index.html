<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arsip Berita - SMK Negeri 1 Tanjung Selor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            scroll-behavior: smooth;
        }

        .nav-link {
            position: relative;
            transition: color 0.3s;
        }

        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -4px;
            left: 0;
            background-color: #eab308;
            transition: width 0.3s;
        }

        .nav-link:hover::after,
        .nav-link.active::after {
            width: 100%;
        }

        .news-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .news-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 25px 50px -12px rgba(30, 58, 138, 0.15);
        }
    </style>
</head>

<body class="min-h-screen bg-slate-50 flex flex-col pt-20">
    <div class="min-h-screen flex flex-col">
        <!-- HEADER -->
        <div id="header-include"></div>

        <section class="bg-red-900 py-20 relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 text-yellow-400 pointer-events-none">
                <i data-lucide="newspaper" class="absolute -right-20 -bottom-20 opacity-20"
                    style="width: 400px; height: 400px;"></i>
                <i data-lucide="megaphone" class="absolute -left-20 -top-20 opacity-10"
                    style="width: 300px; height: 300px;"></i>
            </div>
            <div class="max-w-7xl mx-auto px-4 relative z-10 text-center">
                <h2 class="text-5xl font-black text-white mb-6 italic uppercase tracking-tighter">Arsip Berita &
                    Kegiatan</h2>
                <p class="text-red-100 max-w-2xl mx-auto font-medium text-lg leading-relaxed">
                    Temukan informasi terbaru seputar prestasi, inovasi, dan jejak langkah perjalanan SMK Negeri 1
                    Tanjung Selor.
                </p>
            </div>
        </section>

        <main class="flex-grow max-w-7xl mx-auto px-4 py-16 w-full">
            <div class="flex flex-col md:flex-row gap-8 items-center justify-between mb-16">
                <div class="w-full md:w-1/3 relative">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="search" style="width: 18px; height: 18px;"></i>
                    </div>
                    <input id="searchInput" type="text" placeholder="Cari berita..."
                        class="w-full pl-12 pr-4 py-4 bg-white border-2 border-slate-100 rounded-2xl shadow-sm focus:ring-4 focus:ring-red-100 focus:border-red-900 outline-none transition-all font-bold text-sm">
                </div>

                <div id="categoryButtons" class="flex flex-wrap justify-center gap-2"></div>
            </div>

            <div id="newsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>

            <div id="emptyState"
                class="hidden py-32 text-center bg-white rounded-[3rem] border-2 border-dashed border-slate-200">
                <div
                    class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-6 text-slate-300">
                    <i data-lucide="search-x" style="width: 40px; height: 40px;"></i>
                </div>
                <h4 class="text-2xl font-black text-slate-400 uppercase tracking-tighter">Berita tidak ditemukan</h4>
                <p class="text-slate-400 mt-2 font-medium italic">Coba gunakan kata kunci atau kategori lain.</p>
            </div>

            <div class="mt-20 flex justify-center items-center gap-4">

                <button id="prevPage"
                    class="w-12 h-12 rounded-xl border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-red-900 hover:text-white transition-all">
                    <i data-lucide="chevron-left" style="width: 20px; height: 20px;"></i>
                </button>

                <span id="pageInfo"
                    class="px-6 py-3 bg-white border border-slate-200 rounded-xl font-black text-red-900 text-sm">
                    Halaman 1 dari 1
                </span>

                <button id="nextPage"
                    class="w-12 h-12 rounded-xl border border-slate-200 flex items-center justify-center text-slate-400 hover:bg-red-900 hover:text-white transition-all">
                    <i data-lucide="chevron-right" style="width: 20px; height: 20px;"></i>
                </button>

            </div>
        </main>

        <!-- FOOTER -->
        <div id="footer-include"></div>
    </div>

    <script>
        let currentPage = 1;
        let totalPages = 1;

        async function loadComponent(id, file) {
            try {
                const res = await fetch(file);
                const html = await res.text();
                document.getElementById(id).innerHTML = html;
            } catch (err) {
                console.error("Gagal load component:", file, err);
            }
        }

        loadComponent("header-include", "../components/header.html");
        loadComponent("footer-include", "../components/footer.html");

        document.addEventListener("DOMContentLoaded", function () {
            const API_BASE = "https://smkn1tanjungselor.sch.id/contents/?rest_route=/wp/v2";
            const newsGrid = document.getElementById("newsGrid");
            const emptyState = document.getElementById("emptyState");
            const categoryButtons = document.getElementById("categoryButtons");
            const searchInput = document.getElementById("searchInput");
            const prevBtn = document.getElementById("prevPage");
            const nextBtn = document.getElementById("nextPage");
            const pageInfo = document.getElementById("pageInfo");

            let allPosts = [];
            let allCategories = [];
            let activeCategory = "Semua";
            let searchQuery = "";

            function refreshIcons() {
                if (window.lucide && typeof window.lucide.createIcons === "function") {
                    window.lucide.createIcons();
                }
            }

            function stripHTML(html) {
                const div = document.createElement("div");
                div.innerHTML = html || "";
                return div.textContent || div.innerText || "";
            }

            function formatDate(dateString) {
                const date = new Date(dateString);
                return date.toLocaleDateString("id-ID", {
                    day: "2-digit",
                    month: "long",
                    year: "numeric"
                });
            }

            function getFeaturedImage(post) {
                return post?._embedded?.["wp:featuredmedia"]?.[0]?.source_url || null;
            }

            function getCategoryNames(post) {
                if (!post.categories || !post.categories.length) return [];
                return post.categories
                    .map(catId => {
                        const found = allCategories.find(cat => cat.id === catId);
                        return found ? found.name : null;
                    })
                    .filter(Boolean);
            }

            function getPrimaryCategory(post) {
                const names = getCategoryNames(post);
                return names.length ? names[0] : "Informasi";
            }

            function getImageHTML(post) {
                const imageUrl = getFeaturedImage(post);

                if (imageUrl) {
                    return `
                    <img 
                        src="${imageUrl}" 
                        alt="${stripHTML(post.title.rendered)}"
                        class="w-full h-full object-cover"
                    />
                `;
                }

                return `
                <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-300">
                    <i data-lucide="image" style="width: 64px; height: 64px; stroke-width: 1;"></i>
                    <span class="text-[8px] font-black uppercase tracking-[0.2em] mt-4 opacity-50">No Image</span>
                </div>
            `;
            }

            function createNewsCard(post) {
                const title = stripHTML(post.title.rendered);
                const excerpt = stripHTML(post.excerpt.rendered).trim() || "Baca selengkapnya untuk mengetahui informasi lebih lengkap.";
                const date = formatDate(post.date);
                const category = getPrimaryCategory(post);

                return `
                <div class="news-card bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden flex flex-col group h-full">
                    <div class="relative aspect-video bg-slate-100 overflow-hidden">
                        ${getImageHTML(post)}
                        <div class="absolute top-4 left-4">
                            <span class="px-4 py-1.5 bg-red-900 text-yellow-400 rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg">
                                ${category}
                            </span>
                        </div>
                    </div>

                    <div class="p-8 flex flex-col flex-grow">
                        <div class="flex items-center gap-2 text-slate-400 text-[10px] font-bold uppercase mb-4 tracking-wider">
                            <i data-lucide="calendar" style="width: 12px; height: 12px;"></i>
                            <span>${date}</span>
                        </div>

                        <h4 class="text-xl font-black text-red-950 uppercase tracking-tighter mb-4 leading-snug group-hover:text-red-700 transition-colors">
                            ${title}
                        </h4>

                        <p class="text-slate-500 text-sm leading-relaxed font-medium mb-8">
                            ${excerpt}
                        </p>

                        <div class="mt-auto pt-6 border-t border-slate-100">
                            <a href="detail_blog.html?id=${post.id}" class="flex items-center gap-2 text-red-900 font-black text-xs uppercase tracking-widest hover:text-yellow-600 transition-all">
                                <span>Selengkapnya</span>
                                <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                            </a>
                        </div>
                    </div>
                </div>
            `;
            }

            function renderCategories() {
                if (!categoryButtons) return;

                const categoryNames = [
                    "Semua",
                    ...allCategories.map(cat => cat.name)
                ];

                categoryButtons.innerHTML = "";

                categoryNames.forEach(function (cat) {
                    const button = document.createElement("button");
                    button.textContent = cat;
                    button.className = activeCategory === cat
                        ? "px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all bg-red-900 text-yellow-400 shadow-lg"
                        : "px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all bg-white text-slate-500 border border-slate-200 hover:border-red-900";

                    button.addEventListener("click", function () {
                        activeCategory = cat;
                        currentPage = 1;
                        renderCategories();
                        loadPosts(1);
                    });

                    categoryButtons.appendChild(button);
                });
            }

            function renderNews() {
                if (!newsGrid || !emptyState) return;

                const filteredPosts = allPosts.filter(post => {
                    const title = stripHTML(post.title.rendered).toLowerCase();
                    const excerpt = stripHTML(post.excerpt.rendered).toLowerCase();
                    const categories = getCategoryNames(post);

                    const matchesSearch =
                        title.includes(searchQuery.toLowerCase()) ||
                        excerpt.includes(searchQuery.toLowerCase());

                    const matchesCategory =
                        activeCategory === "Semua" ||
                        categories.includes(activeCategory);

                    return matchesSearch && matchesCategory;
                });

                if (filteredPosts.length > 0) {
                    newsGrid.innerHTML = filteredPosts.map(createNewsCard).join("");
                    newsGrid.classList.remove("hidden");
                    emptyState.classList.add("hidden");
                } else {
                    newsGrid.innerHTML = "";
                    newsGrid.classList.add("hidden");
                    emptyState.classList.remove("hidden");
                }

                refreshIcons();
            }

            async function loadCategories() {
                try {
                    const res = await fetch(`${API_BASE}/categories&per_page=100`);
                    if (!res.ok) throw new Error("Gagal load categories");
                    allCategories = await res.json();
                } catch (err) {
                    console.error("Error categories:", err);
                    allCategories = [];
                }
            }

            function updatePagination() {
                pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages}`;

                prevBtn.disabled = currentPage === 1;
                nextBtn.disabled = currentPage === totalPages;

                prevBtn.classList.toggle("opacity-50", currentPage === 1);
                prevBtn.classList.toggle("cursor-not-allowed", currentPage === 1);

                nextBtn.classList.toggle("opacity-50", currentPage === totalPages);
                nextBtn.classList.toggle("cursor-not-allowed", currentPage === totalPages);
            }

            async function loadPosts(page = 1) {
                try {
                    const res = await fetch(`${API_BASE}/posts&_embed&page=${page}&per_page=15`);
                    if (!res.ok) throw new Error("Gagal load posts");

                    const data = await res.json();

                    totalPages = parseInt(res.headers.get("X-WP-TotalPages")) || 1;
                    currentPage = page;
                    allPosts = data;

                    renderNews();
                    updatePagination();
                } catch (err) {
                    console.error("Error posts:", err);
                }
            }

            if (searchInput) {
                searchInput.addEventListener("input", function (e) {
                    searchQuery = e.target.value || "";
                    renderNews();
                });
            }

            prevBtn.addEventListener("click", function () {
                if (currentPage > 1) {
                    loadPosts(currentPage - 1);
                }
            });

            nextBtn.addEventListener("click", function () {
                if (currentPage < totalPages) {
                    loadPosts(currentPage + 1);
                }
            });

            (async function init() {
                await loadCategories();
                renderCategories();
                await loadPosts(1);
                refreshIcons();
            })();
        });
    </script>
</body>

</html>
